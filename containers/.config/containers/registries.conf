# Podman container registry configuration
# Managed by dotfiles -- do not edit directly

# Default unqualified search registries
unqualified-search-registries = ["docker.io", "ghcr.io"]

# docker.io registry with mirror.gcr.io for improved availability
[[registry]]
location = "docker.io"
[[registry.mirror]]
location = "mirror.gcr.io"

# ghcr.io registry (GitHub Container Registry)
[[registry]]
location = "ghcr.io"
