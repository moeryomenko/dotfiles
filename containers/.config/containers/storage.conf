# Podman storage configuration
# Managed by dotfiles -- do not edit directly

[storage]
# Storage driver: overlay is the default and recommended driver on Arch Linux
driver = "overlay"

# Runroot: ephemeral runtime data directory (tmpfs-backed on most systems)
runroot = "/run/user/1000/containers"

# Graphroot: persistent storage for images and containers
graphroot = "/home/eryoma/.local/share/containers/storage"

[storage.options]
# Compress layer tarballs to reduce disk usage
compress = true

# Overlay mount options: nodev for security, metacopy=on for metadata-only copy-up performance
overlay.mountopt = "nodev,metacopy=on"
