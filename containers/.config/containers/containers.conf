# Podman containers.conf — User-level container runtime configuration
#
# Managed via GNU Stow: containers/.config/containers/containers.conf
# Target: ~/.config/containers/containers.conf
#
# This file overrides /usr/share/containers/containers.conf (distribution defaults)
# and /etc/containers/containers.conf (system-wide config). User config has the
# highest precedence in Podman's three-level config chain.
#
# Environment:
#   - User: rootless, UID 1000
#   - OS: Arch Linux
#   - Podman: 6.0.0+
#   - Runtime: crun
#   - Networking: netavark/aardvark-dns
#   - Logging: journald

# [containers] — Default container runtime settings
# Controls how containers are created and run by default.
[containers]

# pids_limit = 2048
# Maximum number of PIDs allowed inside a container (per Cgroup PID controller).
# 2048 is Podman's built-in default; setting it explicitly guarantees consistent
# behavior across Podman versions. Prevents fork bombs while allowing most
# workloads (web servers, databases, build pipelines). Increase for workloads
# that spawn many processes (e.g., CI runners, parallel builds).
pids_limit = 2048

# userns_size = 65536
# Size of the user namespace (UID/GID mapping) for rootless containers.
# 65536 (2^16) is the standard allocation that maps the entire 16-bit UID range
# into the container's user namespace. This gives each container 65536 UIDs/GIDs
# starting from the user's subordinate ID range (/etc/subuid, /etc/subgid).
# Required for rootless containers that need to remap many UIDs.
userns_size = 65536

# http_proxy = true
# When true, pass the host's HTTP proxy environment variables (http_proxy,
# https_proxy, no_proxy) into the container. Podman reads these from the host
# environment at container start. This is the default behavior; setting it
# explicitly ensures proxy settings are always forwarded for containerized
# workflows behind a corporate or local proxy.
http_proxy = true

# [engine] — Podman engine behavior and API settings
# Controls the Podman daemon-less engine, including REST API, event handling,
# and container lifecycle policies.
[engine]

# compat_api_enabled = true
# Enable the Docker-compatible REST API socket at /run/user/1000/podman/podman.sock
# (rootless) or /run/podman/podman.sock (root). This allows Docker clients and
# Docker-compatible tools (docker-compose, Portainer, etc.) to use Podman as a
# drop-in replacement via the DOCKER_HOST environment variable.
# The user's fish config sets DOCKER_HOST=unix:///run/user/1000/podman/podman.sock,
# so this must be enabled for compatibility tools to work.
compat_api_enabled = true

# retry = 3
# Number of times to retry pulling or pushing container images on failure.
# The default is often 0 or 1. Setting to 3 provides resilience against
# transient network errors, registry timeouts, and rate-limiting interruptions
# without excessively delaying failure detection.
retry = 3

# events_logger = "journald"
# Backend for recording Podman lifecycle events (container start/stop,
# image pull, network create, etc.). Using journald integrates with the
# systemd journal, enabling structured log queries via journalctl:
#   journalctl _COMM=podman --since "5 minutes ago"
# journald is preferred over the default "file" logger because it provides
# automatic log rotation, rate limiting, and consistent access controls.
events_logger = "journald"

# healthcheck_config
# Default health check parameters applied to every container that defines a
# HEALTHCHECK instruction (in Dockerfile or via --health-* flags).
#   - start-period=30s: Grace period before health checks begin (gives app time to init)
#   - interval=30s: How often the health check command runs
#   - timeout=30s: Maximum time a health check may take before considered failed
#   - retries=3: Consecutive failures before marking container unhealthy
# These provide sane defaults aligned with typical web service startup times.
healthcheck_config = [
    "start-period=30s",
    "interval=30s",
    "timeout=30s",
    "retries=3"
]

# [network] — Container networking defaults
# Controls the default network configuration for Podman containers.
[network]

# default_network = "podman"
# The default network name for containers that are not explicitly attached to a
# network. Podman 6.0+ uses netavark as the network backend, and the default
# network created by Podman is named "podman". Setting this explicitly ensures
# that containers use the default netavark-managed network rather than falling
# back to a different network stack (e.g., CNI, which is deprecated).
default_network = "podman"

# [secrets] — Secret management driver
# Controls how Podman stores and retrieves secrets for use in containers.
[secrets]

# driver = "pass"
# Use the pass (password-store) CLI as the secrets backend. pass stores secrets
# encrypted with a GPG key in ~/.password-store/, providing GPG-encrypted
# storage with optional git-based sync. Alternative drivers include:
#   - "file": Secrets stored in plain text under ~/.local/share/containers/storage/secrets/
#   - "env": Secrets passed via environment variables (insecure for persistent storage)
# pass is chosen for improved security over the default "file" driver.
driver = "pass"
