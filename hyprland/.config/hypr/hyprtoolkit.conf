# vim:filetype=dosini
# hyprtoolkit theme — Nord palette
#
# hyprlauncher and other hyprtoolkit apps read this file.
# Color format: 0xAARRGGBB
#
# Nord palette reference:
#   Polar Night: nord0 #2E3440  nord1 #3B4252  nord2 #434C5E  nord3 #4C566A
#   Snow Storm:  nord4 #D8DEE9  nord5 #E5E9F0  nord6 #ECEFF4
#   Frost:       nord7 #8FBCBB  nord8 #88C0D0  nord9 #81A1C1  nord10 #5E81AC
#   Aurora:     nord11 #BF616A nord12 #D08770 nord13 #EBCB8B nord14 #A3BE8C nord15 #B48EAD

# Core backgrounds
background     = 0xFF2E3440  # nord0 — deep polar night
base           = 0xFF3B4252  # nord1 — surface base
alternate_base = 0xFF434C5E  # nord2 — alternate surface

# Text
text       = 0xFFD8DEE9  # nord4 — primary text (snow storm)
bright_text = 0xFFECEFF4 # nord6 — bright / highlighted text
link_text   = 0xFF81A1C1 # nord9 — frost link

# Accents
accent           = 0xFF88C0D0  # nord8 — frost blue (primary)
accent_secondary = 0xFFA3BE8C  # nord14 — aurora green (secondary)
