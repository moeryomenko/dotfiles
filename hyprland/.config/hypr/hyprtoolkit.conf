# vim:filetype=dosini
# hyprtoolkit theme — neon_dreams palette
#
# hyprlauncher and other hyprtoolkit apps read this file.
# Color format: 0xAARRGGBB
#
# neon_dreams palette reference:
#   background       = 0xFF1a2642  — deep blue bg
#   base             = 0xFF243556  — lighter bg
#   alternate_base   = 0xFF2a3d5f  — even lighter
#   text             = 0xFFa8b9e6  — soft blue-white fg
#   bright_text      = 0xFFc5d4ff  — bright blue-white
#   link_text        = 0xFF5fc9e8  — cyan
#   accent           = 0xFF5f9eff  — electric blue
#   accent_secondary = 0xFF66e8b5  — mint green

# Core backgrounds
background     = 0xFF1a2642  # neon_dreams background — deep blue bg
base           = 0xFF243556  # neon_dreams base — lighter bg
alternate_base = 0xFF2a3d5f  # neon_dreams alternate_base — even lighter

# Text
text       = 0xFFa8b9e6  # neon_dreams text — soft blue-white fg
bright_text = 0xFFc5d4ff # neon_dreams bright_text — bright blue-white
link_text   = 0xFF5fc9e8 # neon_dreams link_text — cyan

# Accents
accent           = 0xFF5f9eff  # neon_dreams accent — electric blue (primary)
accent_secondary = 0xFF66e8b5  # neon_dreams accent_secondary — mint green (secondary)
