# Neon Dreams theme colors for tmux
# Inspired by vibrant neon blue and pink/purple aesthetic

#+--- Colors ---+
set -g status-style bg=default,fg=#a8b9e6

#+--- Panes ---+
set -g pane-border-style fg=#3d4d73
set -g pane-active-border-style "bg=default fg=#ff6eb5"

#+--- Bars ---+
set -g status-left-length 200
set -g status-right-length 200
set -g status-left ""
set -g status-right "#{?client_prefix,#[reverse]<Prefix>#[noreverse] ,}#[fg=blue,bg=default]  #[fg=#a8b9e6,bg=default]#(~/.tmux/kube.sh)#[fg=#a8b9e6,bg=default] | #[fg=#ff6eb5,bg=default]#(route -n get default | grep interface | awk '{print $2}')#[fg=#7eb5ff,bg=default]#(scutil --nc list | grep Connected | grep -E 'VPN|wireguard' | awk -F'\"' '{print \" | \"$2}' | head -1) #[fg=#a8b9e6,bg=default]|#[fg=#5fc9e8,bg=default] %Y-%m-%d #[fg=#a8b9e6,bg=default]|#[fg=#66e8b5,bg=default] %H:%M #[fg=#a8b9e6,bg=default]| #[fg=#ff6eb5,bg=default]#(~/.tmux/battery.sh)"

#+--- Windows ---+
set -g window-status-format "#[fg=#a8b9e6,bg=default] #W "
set -g window-status-current-format "#[fg=#ff6eb5,bold,bg=default] #W "
set -g window-status-last-style "fg=#a8b9e6,bg=default"
set -g message-command-style "bg=default,fg=#a8b9e6"
set -g message-style "bg=default,fg=#a8b9e6"
set -g mode-style "bg=#ff6eb5,fg=#1a2642"
