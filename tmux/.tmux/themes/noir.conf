# Neovim Default colorscheme for tmux
# Based on Neovim's default dark colorscheme (src/nvim/highlight_group.c)

bg="#14161b"
default_fg="#e0e2ea"
session_fg="#a6dbff"
session_selection_fg="#07080d"
session_selection_bg="#8cf8f7"
active_window_fg="#8cf8f7"
active_pane_border="#8cf8f7"
inactive_pane_border="#4f5258"
status_fg="#9b9ea4"
accent_cyan="#8cf8f7"
accent_blue="#a6dbff"
accent_magenta="#aa0008"
accent_green="#b3f6c0"

set -g status-left-length 200
set -g status-right-length 200
set -g status-left ""
set -g status-right "#{?client_prefix,#[reverse]<Prefix>#[noreverse] ,} #[fg=${accent_green}]#(hyprctl devices -j | jq -r '.keyboards[] | select(.main == true) | .active_keymap' | sed 's/English (US)/US/; s/Russian/RU/') #[fg=${status_fg},bg=${bg}]| #[fg=${accent_blue},bg=${bg}]  #[fg=${status_fg},bg=${bg}]#(~/.tmux/kube.sh) #[fg=${status_fg},bg=${bg}]| #[fg=${accent_magenta}]#(ip route | grep default | awk '{print $5}' | head -1)#[fg=${accent_green}]#(nmcli connection show --active | grep -E 'vpn|tun|wireguard' | awk '{print \" | \"$1}' | head -1) #[fg=${status_fg},bg=${bg}]| #[fg=${accent_green}]  #(pactl get-sink-volume @DEFAULT_SINK@ | awk '{print $5}' | tr -d '%')% #[fg=${status_fg},bg=${bg}]| #[fg=${accent_cyan},bg=${bg}]%Y-%m-%d #[fg=${status_fg},bg=${bg}]| #[fg=${accent_green},bg=${bg}]%H:%M #[fg=${status_fg},bg=${bg}]"
set -g status-justify left
set -g status-style "bg=${bg}"
set -g window-status-format "#[fg=${default_fg},bg=default] #I:#W"
set -g window-status-current-format "#[fg=${active_window_fg},bold,bg=default]  #[underscore]#I:#W"
set -g window-status-last-style "fg=${default_fg},bg=default"
set -g message-command-style "bg=default,fg=${default_fg}"
set -g message-style "bg=default,fg=${default_fg}"
set -g mode-style "bg=${session_selection_bg},fg=${session_selection_fg}"
set -g pane-active-border-style "fg=${active_pane_border},bg=default"
set -g pane-border-style "fg=${inactive_pane_border},bg=default"
